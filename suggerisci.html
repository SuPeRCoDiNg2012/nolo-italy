<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>No/Lo Italy - Suggest a Producer</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Plus+Jakarta+Sans:wght@600;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
    <link rel="stylesheet" href="style.css" />
    <meta name="theme-color" content="#fff5f5">
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍹</text></svg>">
</head>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-CSJ6XGTYHT"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-CSJ6XGTYHT');
</script>
<body>
    <div class="page-container">
        <div class="page-header">
            <a href="index.html" class="back-btn">
                <span class="material-icons">arrow_back</span>
            </a>
            <h1 id="pageTitle">Suggest a <span>Brand</span></h1>
        </div>

        <div class="page-card" id="introCard" style="background:var(--accent-yellow); border-color:var(--text-ink);">
            <p id="introText" style="margin:0; font-weight:600;">🚀 Help us grow! Suggest a producer that deserves to be on the map.</p>
        </div>

        <div class="page-card">
            <form onsubmit="submitSuggestion(event)">

                <!-- NOME -->
                <div class="form-group">
                    <label class="form-label">Brand / Company Name *</label>
                    <input type="text" class="form-input" id="sugName" placeholder="E.g. Eko lab" required />
                </div>

                <!-- CATEGORIA -->
                <div class="form-group">
                    <label class="form-label">Category *</label>
                    <select class="form-input" id="sugCat" required>
                        <option value="">Select a category...</option>
                        <option value="beer">🍺 Beer</option>
                        <option value="wine">🍷 Wine</option>
                        <option value="spirits">🥃 Spirits</option>
                        <option value="kombucha">🍵 Kombucha</option>
                        <option value="cider">🍎 Cider</option>
                        <option value="other">🧪 Other</option>
                    </select>
                </div>

                <!-- INDIRIZZO -->
                <div class="form-group">
                    <label class="form-label">Address *</label>
                    <input type="text" class="form-input" id="sugAddress" placeholder="E.g. Via Roma 1, Milano" required />
                </div>

                <!-- PROVINCIA -->
                <div class="form-group">
                    <label class="form-label">Province *</label>
                    <input type="text" class="form-input" id="sugProv" placeholder="E.g. MI" required />
                </div>

                <!-- STATUS -->
                <div class="form-group">
                    <label class="form-label">Status</label>
                    <select class="form-input" id="sugStatus">
                        <option value="Attivo">✅ Active</option>
                        <option value="In pausa">⏸️ Paused</option>
                        <option value="Chiuso">❌ Closed</option>
                    </select>
                </div>

                <!-- WEBSITE -->
                <div class="form-group">
                    <label class="form-label">Website</label>
                    <input type="url" class="form-input" id="sugWeb" placeholder="https://example.com" />
                </div>

                <!-- INSTAGRAM -->
                <div class="form-group">
                    <label class="form-label">Instagram</label>
                    <input type="url" class="form-input" id="sugIg" placeholder="https://instagram.com/..." />
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="material-icons">send</span> Send Suggestion
                </button>
            </form>
        </div>

        <p style="font-size:0.75rem; color:var(--text-dim); text-align:center;">Fields marked with * are required.</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
