<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Pagina Non Trovata | No/Lo Italy</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <meta name="theme-color" content="#fff5f5">

<link rel="icon" type="image/png" href="favicon.png">

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🍹</text></svg>">
    <style>
        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #fff5f5; /* Un rosa/crema pastello delicato */
            color: #2b2b2b;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            background: white;
            padding: 40px 30px;
            border: 3px solid #2b2b2b;
            border-radius: 20px;
            box-shadow: 5px 5px 0px #2b2b2b; /* Ombra pop/venerdì */
        }

        .emoji-art {
            font-size: 5rem;
            margin-bottom: 10px;
            animation: float 3s ease-in-out infinite;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0 0 10px 0;
            color: #ff6b6b; /* Un rosso/rosa pop */
        }

        p {
            font-size: 1.1rem;
            line-height: 1.4;
            margin: 0 0 25px 0;
        }

        .back-btn {
            display: inline-block;
            text-decoration: none;
            background-color: #ffde6a; /* Giallo pastello cute */
            color: #2b2b2b;
            font-weight: 600;
            padding: 12px 25px;
            border: 2px solid #2b2b2b;
            border-radius: 12px;
            box-shadow: 3px 3px 0px #2b2b2b;
            transition: transform 0.1s ease;
        }

        .back-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #2b2b2b;
        }

        /* Animazione fluttuante per l'emoji */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="emoji-art">🥤🫙💨</div>
        <h1>Ops! 404</h1>
        <p>Questo drink è andato a male... o forse la pagina che cercavi non è mai esistita!</p>
        
        <a href="/" class="back-btn"><span class="mate"></span>Torna alla mappa</a>
    </div>

</body>
</html>
